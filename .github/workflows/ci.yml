name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-user-service:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build and Test User Service
        run: mvn clean test
        working-directory: ./user-service

      - name: Build Docker Image
        run: docker build -t user-service:latest .
        working-directory: ./user-service

  build-task-service:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build and Test Task Service
        run: mvn clean test
        working-directory: ./task-manager

      - name: Build Docker Image
        run: docker build -t task-service:latest .
        working-directory: ./task-manager

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build React Application
        run: npm run build
        working-directory: ./frontend

      - name: Build Docker Image
        run: docker build -t frontend-service:latest .
        working-directory: ./frontend
